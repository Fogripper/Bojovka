<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOJOVKA.EXE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a0a2e;--navy2:#12124a;--blue:#1a1aff;--cyan:#00e5ff;
  --red:#ff1a1a;--red2:#cc0000;--yellow:#ffe600;--white:#ffffff;
  --gray:#8888aa;--black:#000000;--green:#00ff66;
}
body{font-family:'Press Start 2P',monospace;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);}

/* ÔöÇÔöÇ HEADER ÔöÇÔöÇ */
header{background:var(--red2);border-bottom:4px solid var(--yellow);padding:0;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:1000;}
.logo{padding:10px 14px;}
.logo-title{font-size:11px;color:var(--yellow);letter-spacing:1px;text-shadow:2px 2px 0 var(--black);}
.logo-sub{font-size:6px;color:var(--white);letter-spacing:1px;margin-top:3px;opacity:.8;}
.header-right{display:flex;align-items:stretch;}
.admin-link{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--navy);text-decoration:none;background:var(--yellow);border-left:4px solid var(--black);padding:0 12px;display:flex;align-items:center;}
.admin-link:hover{background:var(--white);}

/* ÔöÇÔöÇ MAP ÔöÇÔöÇ */
#map-wrap{position:relative;}
#map{width:100%;height:calc(100vh - 58px);}
.status-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:500;background:var(--navy);border:3px solid var(--cyan);padding:6px 12px;font-size:7px;color:var(--cyan);letter-spacing:1px;white-space:nowrap;text-shadow:0 0 8px var(--cyan);}
.status-bar.warn{border-color:var(--yellow);color:var(--yellow);text-shadow:0 0 8px var(--yellow);}
.status-bar.error{border-color:var(--red);color:var(--red);text-shadow:0 0 8px var(--red);}

/* ÔöÇÔöÇ SCORE PANEL ÔöÇÔöÇ */
.score-panel{position:absolute;bottom:70px;right:10px;z-index:500;background:rgba(10,10,46,.95);border:3px solid var(--yellow);padding:8px 10px;min-width:90px;cursor:pointer;}
.score-panel .team-name{font-size:6px;color:var(--cyan);margin-bottom:3px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px;}
.score-panel .slabel{font-size:5px;color:var(--yellow);margin-bottom:3px;display:block;}
.score-panel .svalue{font-size:16px;color:var(--white);line-height:1;text-shadow:2px 2px 0 var(--red2);}
.score-panel .refresh-hint{font-size:5px;color:var(--gray);margin-top:4px;display:block;}

/* STREAK INDIK├üTOR */
.streak-wrap{display:flex;align-items:center;justify-content:center;margin-top:5px;min-height:22px;}
.streak-fire{font-size:16px;line-height:1;transition:all .3s;}
.streak-fire.cold{opacity:.25;filter:grayscale(1);font-size:14px;}
.streak-fire.warm{opacity:.7;font-size:16px;}
.streak-fire.hot{opacity:1;font-size:20px;animation:fireburn .6s ease-in-out infinite alternate;filter:drop-shadow(0 0 6px #ff6600);}
.streak-fire.inferno{opacity:1;font-size:24px;animation:fireburn .35s ease-in-out infinite alternate;filter:drop-shadow(0 0 12px #ff3300) drop-shadow(0 0 20px #ff6600);}
@keyframes fireburn{
  from{transform:scale(1) rotate(-3deg);}
  to{transform:scale(1.15) rotate(3deg);}
}
.streak-num{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yellow);margin-left:3px;line-height:1;}
.streak-num.hot{color:#ff6600;text-shadow:0 0 8px #ff6600;}
.streak-num.inferno{color:#ff3300;text-shadow:0 0 12px #ff3300,0 0 4px #ffaa00;}

/* ÔöÇÔöÇ MARKERS ÔöÇÔöÇ */
.px-marker{width:40px!important;height:40px!important;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;image-rendering:pixelated;background:var(--red);border:3px solid var(--yellow);outline:2px solid var(--black);box-shadow:3px 3px 0 var(--black);position:relative;}
.px-marker .m-num{position:absolute;bottom:-2px;right:1px;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--yellow);text-shadow:1px 1px 0 var(--black);line-height:1;}
.px-marker.locked{background:var(--navy2)!important;border-color:var(--gray)!important;box-shadow:none!important;filter:grayscale(1);cursor:default;}
.px-marker.locked .m-num{color:var(--gray);}
.px-marker.answered{background:var(--navy2);border-color:var(--gray);box-shadow:none;filter:grayscale(0.7);}
.px-marker.answered .m-num{color:var(--gray);}
.px-marker.nearby{background:var(--yellow);border-color:var(--white);box-shadow:3px 3px 0 var(--black),0 0 18px var(--yellow);animation:blink8 .4s step-end infinite;}
.px-marker.nearby .m-num{color:var(--black);}
@keyframes blink8{0%,100%{opacity:1}50%{opacity:0}}

/* ÔöÇÔöÇ LOGIN SCREEN ÔöÇÔöÇ */
.screen{display:none;position:fixed;inset:0;background:var(--navy);z-index:5000;align-items:center;justify-content:center;padding:20px;}
.screen.show{display:flex;}
.login-box{background:var(--navy2);border:4px solid var(--yellow);padding:28px 24px;max-width:360px;width:100%;box-shadow:8px 8px 0 var(--black);}
.login-title{font-size:14px;color:var(--yellow);text-shadow:2px 2px 0 var(--black);margin-bottom:6px;text-align:center;}
.login-sub{font-family:'VT323',monospace;font-size:18px;color:var(--gray);text-align:center;margin-bottom:20px;}
.login-input{width:100%;background:var(--navy);border:3px solid var(--white);color:var(--white);font-family:'Press Start 2P',monospace;font-size:10px;padding:12px;outline:none;caret-color:var(--cyan);margin-bottom:12px;text-align:center;letter-spacing:2px;}
.login-input:focus{border-color:var(--cyan);}
.login-input::placeholder{color:var(--gray);font-size:8px;letter-spacing:1px;}
.login-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:14px;background:var(--red);color:var(--white);border:3px solid var(--yellow);cursor:pointer;width:100%;text-shadow:1px 1px 0 var(--black);box-shadow:4px 4px 0 var(--black);transition:background .1s;}
.login-btn:hover{background:var(--red2);}
.login-btn:active{transform:translate(3px,3px);box-shadow:none;}

/* ÔöÇÔöÇ LEADERBOARD OVERLAY ÔöÇÔöÇ */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,5,.95);z-index:3000;align-items:center;justify-content:center;padding:16px;}
.lb-overlay.show{display:flex;}
.lb-box{background:var(--navy2);border:4px solid var(--yellow);max-width:400px;width:100%;box-shadow:8px 8px 0 var(--black);overflow:hidden;}
.lb-header{background:var(--yellow);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.lb-title{font-size:10px;color:var(--black);text-shadow:none;}
.lb-close{font-family:'Press Start 2P',monospace;font-size:8px;background:var(--black);color:var(--yellow);border:none;padding:4px 8px;cursor:pointer;}
.lb-body{padding:14px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:6px;border:2px solid var(--navy);}
.lb-row.me{border-color:var(--cyan);}
.lb-row.rank-1{border-color:var(--yellow);background:rgba(255,230,0,.05);}
.lb-pos{font-size:14px;font-family:'VT323',monospace;color:var(--gray);min-width:24px;}
.lb-row.rank-1 .lb-pos{color:var(--yellow);}
.lb-name{flex:1;font-size:7px;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-row.me .lb-name{color:var(--cyan);}
.lb-pts{font-size:14px;font-family:'VT323',monospace;color:var(--green);}
.lb-cp{font-size:6px;color:var(--gray);margin-top:2px;}
.lb-empty{font-family:'VT323',monospace;font-size:18px;color:var(--gray);text-align:center;padding:20px;}
.lb-refresh{font-family:'Press Start 2P',monospace;font-size:7px;padding:10px;background:var(--blue);color:var(--white);border:2px solid var(--cyan);cursor:pointer;width:100%;margin-top:8px;}
.lb-refresh:hover{background:var(--navy);}
.lb-updated{font-size:6px;color:var(--gray);text-align:center;margin-top:6px;}

/* ÔöÇÔöÇ QUESTION OVERLAY ÔöÇÔöÇ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,5,.92);z-index:2000;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.q-card{background:var(--navy2);border:4px solid var(--white);outline:3px solid var(--blue);max-width:440px;width:100%;box-shadow:8px 8px 0 var(--black);overflow:hidden;}
.q-card-header{background:var(--blue);border-bottom:4px solid var(--cyan);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.q-num{font-size:7px;color:var(--yellow);letter-spacing:2px;text-shadow:1px 1px 0 var(--black);}
.q-close-btn{font-family:'Press Start 2P',monospace;font-size:8px;background:var(--red);color:var(--white);border:2px solid var(--white);padding:4px 8px;cursor:pointer;}
.q-body{padding:16px 14px;}
.q-icon{font-size:32px;margin-bottom:8px;display:block;text-align:center;}
.q-cat{font-size:6px;color:var(--cyan);letter-spacing:2px;margin-bottom:8px;text-align:center;}
.q-text{font-family:'VT323',monospace;font-size:24px;color:var(--white);line-height:1.3;margin-bottom:14px;min-height:56px;}
.q-hint-box{background:var(--navy);border:2px solid var(--cyan);border-left:4px solid var(--cyan);padding:6px 10px;font-family:'VT323',monospace;font-size:17px;color:var(--cyan);margin-bottom:12px;display:none;}
.q-hint-box.show{display:block;}
.q-input{width:100%;background:var(--navy);border:3px solid var(--white);color:var(--white);font-family:'Press Start 2P',monospace;font-size:9px;padding:10px;margin-bottom:12px;outline:none;caret-color:var(--cyan);}
.q-input:focus{border-color:var(--cyan);}
.q-input::placeholder{color:var(--gray);font-size:7px;}
.btn-ok{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 14px;background:var(--red);color:var(--white);border:3px solid var(--yellow);cursor:pointer;width:100%;text-shadow:1px 1px 0 var(--black);box-shadow:3px 3px 0 var(--black);transition:background .1s;}
.btn-ok:hover{background:var(--red2);}
.btn-ok:active{transform:translate(2px,2px);box-shadow:none;}
.q-result{margin-top:12px;font-family:'VT323',monospace;font-size:20px;padding:8px 10px;display:none;border:3px solid;text-align:center;}
.q-result.correct{display:block;color:var(--yellow);border-color:var(--yellow);background:rgba(255,230,0,.1);text-shadow:0 0 10px var(--yellow);}
.q-result.wrong{display:block;color:var(--red);border-color:var(--red);background:rgba(255,26,26,.1);}
.q-result.open{display:block;color:var(--cyan);border-color:var(--cyan);background:rgba(0,229,255,.08);}
.q-counter{font-size:6px;color:var(--gray);text-align:right;margin-top:6px;letter-spacing:1px;}
.btn-hint{font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 12px;background:transparent;color:var(--yellow);border:2px solid var(--yellow);cursor:pointer;width:100%;margin-bottom:10px;letter-spacing:0;transition:all .1s;}
.btn-hint:hover{background:rgba(255,230,0,.1);}
.btn-hint:disabled{opacity:.4;cursor:not-allowed;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy2);border:3px solid var(--yellow);color:var(--yellow);font-size:8px;padding:10px 16px;z-index:9998;transition:transform .2s;white-space:nowrap;text-shadow:0 0 8px var(--yellow);}
.toast.show{transform:translateX(-50%) translateY(0);}
/* Zoom tla─Ź├ştka pod headerem */
.leaflet-top.leaflet-left { top: 68px !important; }
.leaflet-control-zoom a{font-family:'Press Start 2P',monospace!important;background:var(--navy2)!important;color:var(--white)!important;border:2px solid var(--blue)!important;width:36px!important;height:36px!important;line-height:34px!important;font-size:16px!important;}
.leaflet-control-zoom a:hover{background:var(--blue)!important;}
.leaflet-control-attribution{font-size:9px!important;background:rgba(10,10,46,.85)!important;color:var(--gray)!important;}

/* Leaderboard ÔÇö v─Ťt┼í├ş na mobilu */
.lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,5,.95);z-index:3000;align-items:flex-end;justify-content:center;padding:0;}
.lb-overlay.show{display:flex;}
.lb-box{background:var(--navy2);border:4px solid var(--yellow);border-bottom:none;width:100%;max-width:100%;box-shadow:none;overflow:hidden;border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;}
.lb-header{background:var(--yellow);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.lb-title{font-size:14px;color:var(--black);text-shadow:none;}
.lb-close{font-family:'Press Start 2P',monospace;font-size:10px;background:var(--black);color:var(--yellow);border:none;padding:6px 10px;cursor:pointer;}
.lb-body{padding:16px;overflow-y:auto;flex:1;}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border:2px solid var(--navy);border-radius:4px;}
.lb-row.me{border-color:var(--cyan);}
.lb-row.rank-1{border-color:var(--yellow);background:rgba(255,230,0,.05);}
.lb-pos{font-size:22px;font-family:'VT323',monospace;color:var(--gray);min-width:32px;}
.lb-row.rank-1 .lb-pos{color:var(--yellow);}
.lb-name{flex:1;font-size:11px;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-row.me .lb-name{color:var(--cyan);}
.lb-pts{font-size:28px;font-family:'VT323',monospace;color:var(--green);white-space:nowrap;}
.lb-cp{font-size:9px;color:var(--gray);margin-top:2px;}
.lb-refresh{font-family:'Press Start 2P',monospace;font-size:9px;padding:14px;background:var(--blue);color:var(--white);border:2px solid var(--cyan);cursor:pointer;width:100%;margin-top:4px;}
.lb-refresh:hover{background:var(--navy);}
.lb-updated{font-size:9px;color:var(--gray);text-align:center;margin-top:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen show" id="login-screen">
  <div class="login-box">
    <div class="login-title">BOJOVKA.EXE</div>
    <div class="login-sub" id="login-sub-text">Zadej jm├ęno sv├ęho t├Żmu</div>

      onkeydown="if(event.key==='Enter')startGame()">
    <div id="login-status" style="font-family:VT323,monospace;font-size:16px;color:var(--cyan);text-align:center;margin-bottom:8px;min-height:20px;"></div>
    <button class="login-btn" id="btn-start" onclick="startGame()">Ôľ║ START GAME</button>
    <button class="login-btn" id="btn-change-team" onclick="changeTeam()"
      style="display:none;margin-top:8px;background:var(--navy2);border-color:var(--gray);font-size:8px;padding:10px">
      Ôć║ POKRA─îOVAT JAKO <span id="btn-team-name"></span>
    </button>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-title">BOJOVKA.EXE</div>

  </div>

  </div>
</header>

<div id="map-wrap">
  <div id="status-bar" class="status-bar">HLEDAM POLOHU...</div>
  <div id="map"></div>
  <div class="score-panel" onclick="openLeaderboard()">
    <span class="team-name" id="sp-team">ÔÇö</span>
    <span style="font-size:5px;display:block;margin-bottom:3px;" id="sp-route"></span>
    <span class="slabel">SCORE</span>

      <span class="streak-num" id="streak-num">0</span>
    </div>
    <span class="refresh-hint">TAP = TABULKA</span>
  </div>
</div>

<!-- QUESTION OVERLAY -->
<div class="overlay" id="overlay">
  <div class="q-card">
    <div class="q-card-header">
      <div class="q-num" id="q-num">CHECKPOINT #01</div>
      <button class="q-close-btn" onclick="closeOverlay()">ÔťĽ</button>
    </div>
    <div class="q-body">
      <span class="q-icon" id="q-icon">ÔŁô</span>
      <div class="q-cat" id="q-cat">KATEGORIE</div>
      <div class="q-text" id="q-text">...</div>
      <button class="btn-hint" id="q-hint-btn" onclick="revealHint()" style="display:none">­čĺí N├üPOV─ÜDA (-1 BOD)</button>
      <div class="q-hint-box" id="q-hint"></div>
      <input class="q-input" type="text" id="q-input" placeholder="TVOJE ODPOV─Ü─Ä...">
      <button class="btn-ok" id="q-btn" onclick="submitAnswer()">Ôľ║ POTVRDIT</button>
      <div class="q-result" id="q-result"></div>
      <div class="q-counter" id="q-counter"></div>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="lb-overlay" id="lb-overlay">
  <div class="lb-box">
    <div class="lb-header">
      <div class="lb-title">LEADERBOARD</div>
      <button class="lb-close" onclick="closeLeaderboard()">ÔťĽ</button>
    </div>
    <div class="lb-body">
      <div id="lb-list" class="lb-empty">Na─Ź├şt├ím...</div>
      <button class="lb-refresh" onclick="refreshLeaderboard()">Ôć║ AKTUALIZOVAT</button>
      <div class="lb-updated" id="lb-updated"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ÔöÇÔöÇ LOGIN ÔöÇÔöÇ
async function startGame() {
  const val = document.getElementById('team-input').value.trim();
  if (!val) { document.getElementById('team-input').focus(); return; }
  teamName = val.toUpperCase();

  const statusEl = document.getElementById('login-status');
  const btnEl = document.getElementById('btn-start');
  statusEl.textContent = 'P┼śI┼śAZUJI TRASU...';
  btnEl.disabled = true;

  // P┼Öi┼Öa─Ć trasu p┼Öes Worker
  try {
    const res = await fetch(WORKER_URL + '/assign-route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team: teamName, gameId: GAME_ID, routeCount: ROUTES.length }),
    });
    const data = await res.json();
    routeIndex = data.routeIndex || 0;
  } catch(e) {
    // Fallback ÔÇö p┼Öi┼Öa─Ć lok├íln─Ť z localStorage
    const usedRoutes = JSON.parse(localStorage.getItem('bojovka_used_routes_' + GAME_ID) || '{}');
    const counts = Array(ROUTES.length).fill(0);
    Object.values(usedRoutes).forEach(r => { if (r >= 0 && r < ROUTES.length) counts[r]++; });
    const minCount = Math.min(...counts);
    const available = counts.map((c,i) => c===minCount?i:-1).filter(i=>i>=0);
    routeIndex = available[Math.floor(Math.random()*available.length)];
    usedRoutes[teamName] = routeIndex;
    localStorage.setItem('bojovka_used_routes_' + GAME_ID, JSON.stringify(usedRoutes));
  }

  btnEl.disabled = false;
  localStorage.setItem(TEAM_KEY, teamName);
  localStorage.setItem(ROUTE_KEY + '_' + GAME_ID, routeIndex);
  statusEl.textContent = '';

  launchGame();
}

function changeTeam() {
  const savedTeam = localStorage.getItem(TEAM_KEY);
  if (!savedTeam) return;
  teamName = savedTeam;
  routeIndex = parseInt(localStorage.getItem(ROUTE_KEY + '_' + GAME_ID) || '0');
  launchGame();
}

function showLogin() {
  document.getElementById('team-input').value = '';
  document.getElementById('login-screen').classList.add('show');
}

function launchGame() {
  const route = ROUTES[routeIndex] || ROUTES[0];
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('header-team').textContent = 'Ôľ║ ' + teamName;
  document.getElementById('sp-team').textContent = teamName;
  document.getElementById('sp-route').textContent = route.name;
  document.getElementById('sp-route').style.color = route.color;

  // Nastav checkpointy pro tuto trasu z ALL_CHECKPOINTS
  const stored = localStorage.getItem(STORAGE_KEY);
  const storedAll = stored ? JSON.parse(stored) : null;
  // Filtruj jen checkpointy t├ęto trasy
  questions = route.checkpoints.map(cpId => {
    const base = ALL_CHECKPOINTS.find(c => c.id === cpId);
    const stored = storedAll ? storedAll.find(c => c.id === cpId) : null;
    return stored || base || null;
  }).filter(Boolean);

  progress    = JSON.parse(localStorage.getItem(PROGRESS_KEY + '_' + teamName) || '{}');
  totalScore  = Object.values(progress).reduce((s,p) => s+(p.pts||0), 0);
  streakCount = parseInt(localStorage.getItem('bojovka_streak_' + teamName) || '0');

  QUESTION_BANK = JSON.parse(localStorage.getItem(QBANK_KEY) || '[]');
  if (!QUESTION_BANK.length) {
    QUESTION_BANK = BUILTIN_QUESTIONS;
    localStorage.setItem(QBANK_KEY, JSON.stringify(QUESTION_BANK));
  }

  initMap();
  updateScoreDisplay();
  startGPS();
  publishScore();
}

function init() {
  const savedTeam  = localStorage.getItem(TEAM_KEY);
  const savedRoute = localStorage.getItem(ROUTE_KEY + '_' + GAME_ID);
  if (savedTeam && savedRoute !== null) {
    document.getElementById('btn-team-name').textContent = savedTeam;
    document.getElementById('btn-change-team').style.display = 'block';
    document.getElementById('login-sub-text').textContent = 'Nov├Ż t├Żm nebo pokra─Źuj';
  }
}

// ÔöÇÔöÇ MAP ÔöÇÔöÇ
function initMap() {
  if (map) { map.remove(); map = null; Object.keys(markers).forEach(k => delete markers[k]); }
  map = L.map('map', { zoomControl: true }).setView([49.54239, 14.17776], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '┬ę OSM', maxZoom: 19 }).addTo(map);
  renderMarkers();
}

function renderMarkers() {
  Object.values(markers).forEach(m => { map.removeLayer(m.marker); map.removeLayer(m.circle); });
  markers = {};
  questions.forEach((q, i) => placeMarker(q, i + 1));
}

function getMarkerHTML(q, num, cls) {
  const route = ROUTES[routeIndex] || ROUTES[0];
  const icon = q.markerIcon || '­čôŹ';
  return `<div class="px-marker ${cls}" id="m-${q.id}" style="${cls==='nearby'?'':''}${cls==='locked'?'':'border-color:'+route.color+';outline-color:#000;'}">${icon}<span class="m-num">${String(num).padStart(2,'0')}</span></div>`;
}

function placeMarker(q, num) {
  const answered = !!progress[q.id]?.lastAnswered;
  const unlocked = !!progress[q.id]?.unlocked;
  const cls = answered ? 'answered' : unlocked ? '' : 'locked';
  const icon = L.divIcon({ className: '', html: getMarkerHTML(q, num, cls), iconSize: [40,40], iconAnchor: [20,20] });
  const marker = L.marker([q.lat, q.lng], { icon }).addTo(map);
  marker.on('click', () => {
    if (!progress[q.id]?.unlocked && !progress[q.id]?.lastAnswered) toast('P┼śIBLI┼Ż SE KE CHECKPOINTU!');
    else openQuestion(q.id);
  });
  const route = ROUTES[routeIndex] || ROUTES[0];
  const circle = L.circle([q.lat, q.lng], { radius: q.radius||30, color: route.color, fillColor: route.color, fillOpacity: .07, weight: 1.5, dashArray: '4 4', interactive: false }).addTo(map);
  markers[q.id] = { marker, circle };
}

// ÔöÇÔöÇ GPS ÔöÇÔöÇ
function startGPS() {
  if (!navigator.geolocation) { setStatus('GPS NEDOSTUPN├ë','error'); return; }
  setStatus('HLED├üM POLOHU...');
  navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude; userLng = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);
      if (acc > GPS_THRESHOLD) setStatus(`─îEK├üM NA GPS... ┬▒${acc}M`,'warn');
      else setStatus(`SIGN├üL OK  ┬▒${acc}M`);
      updateUserDot(acc);
      if (acc <= GPS_THRESHOLD) checkProximity();
    },
    err => { const m={1:'P┼ś├ŹSTUP ODEP┼śEN',2:'POLOHA NEDOSTUPN├ü',3:'TIMEOUT ÔÇö JDI VEN'}; setStatus(m[err.code]||'GPS CHYBA','error'); },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
  );
}

function updateUserDot(acc) {
  const ll = [userLat, userLng];
  if (!userMarker) {
    const icon = L.divIcon({ className: '', html: `<div style="width:14px;height:14px;background:#00e5ff;border:3px solid #fff;box-shadow:0 0 12px #00e5ff;animation:blink8 1s step-end infinite"></div>`, iconSize:[14,14], iconAnchor:[7,7] });
    userMarker = L.marker(ll, { icon, zIndexOffset: 1000 }).addTo(map);
    map.setView(ll, 16);
  } else { userMarker.setLatLng(ll); }
  const color = acc <= GPS_THRESHOLD ? '#00e5ff' : '#ffe600';
  if (accuracyCircle) { accuracyCircle.setLatLng(ll).setRadius(acc).setStyle({ color, fillColor: color }); }
  else { accuracyCircle = L.circle(ll, { radius: acc, color, fillColor: color, fillOpacity: .06, weight: 1, dashArray: '3 3', interactive: false }).addTo(map); }
}

function checkProximity() {
  if (userLat == null) return;
  questions.forEach(q => {
    if (progress[q.id]?.lastAnswered) return;
    const dist = haversine(userLat, userLng, q.lat, q.lng);
    const r = q.radius || 30;
    const el = document.getElementById('m-' + q.id);
    if (dist <= r) {
      if (!progress[q.id]?.unlocked) { if (!progress[q.id]) progress[q.id] = {}; progress[q.id].unlocked = true; saveProgress(); }
      if (el) { el.classList.remove('locked'); el.classList.add('nearby'); }
      if (!nearbyNotified.has(q.id)) { nearbyNotified.add(q.id); openQuestion(q.id); }
    } else {
      if (el) { el.classList.remove('nearby'); if (!progress[q.id]?.unlocked) el.classList.add('locked'); }
      nearbyNotified.delete(q.id);
    }
  });
}

function haversine(a,b,c,d) {
  const R=6371000,f1=a*Math.PI/180,f2=c*Math.PI/180,df=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180;
  const x=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ÔöÇÔöÇ OT├üZKA ÔöÇÔöÇ
function pickRandomQuestion(cpId) {
  if (!QUESTION_BANK.length) return null;
  const usedKey = 'used_' + cpId + '_' + teamName;
  let used = JSON.parse(sessionStorage.getItem(usedKey)||'[]');
  let available = QUESTION_BANK.filter(q => !used.includes(q.id));
  if (!available.length) { used=[]; sessionStorage.setItem(usedKey,'[]'); available=QUESTION_BANK; }
  const q = available[Math.floor(Math.random()*available.length)];
  used.push(q.id); sessionStorage.setItem(usedKey, JSON.stringify(used));
  return q;
}

function openQuestion(id) {
  const cp = questions.find(x=>x.id===id);
  if (!cp) return;
  activeQuestion = cp;
  const num = questions.indexOf(cp)+1;
  document.getElementById('q-num').textContent = `CHECKPOINT #${String(num).padStart(2,'0')}`;
  const hintEl=document.getElementById('q-hint'), hintBtn=document.getElementById('q-hint-btn');
  const inp=document.getElementById('q-input'), btn=document.getElementById('q-btn');
  const res=document.getElementById('q-result'), counter=document.getElementById('q-counter');
  hintEl.textContent=''; hintEl.classList.remove('show');
  hintBtn.style.display='none'; hintBtn.disabled=false;
  res.className='q-result'; res.textContent='';
  const alreadyDone = !!progress[id]?.lastAnswered;
  let questionObj;
  if (cp.text && cp.text.trim()) {
    activeQBankQ=null; questionObj=cp;
    document.getElementById('q-icon').textContent=cp.markerIcon||'­čôŹ';
    document.getElementById('q-cat').textContent='CHECKPOINT';
  } else {
    const bq=pickRandomQuestion(id); activeQBankQ=bq; questionObj=bq;
    if (bq) { document.getElementById('q-icon').textContent=bq.icon||'ÔŁô'; document.getElementById('q-cat').textContent=bq.category||'OT├üZKA'; }
    else { document.getElementById('q-icon').textContent='ÔÜá´ŞĆ'; document.getElementById('q-cat').textContent=''; document.getElementById('q-text').textContent='┼Ż├ídn├ę ot├ízky v bance.'; inp.style.display='none'; btn.style.display='block'; btn.textContent='Ôľ║ OK'; counter.textContent=''; document.getElementById('overlay').classList.add('show'); return; }
  }
  document.getElementById('q-text').textContent=questionObj.question||questionObj.text;
  counter.textContent='BANKA: '+QUESTION_BANK.length+' OT├üZEK';
  if (questionObj.hint) { hintEl.textContent='­čĺí '+questionObj.hint; hintBtn.style.display='block'; hintBtn.textContent=(cp.points||1)>1?'­čĺí N├üPOV─ÜDA (-1 BOD)':'­čĺí N├üPOV─ÜDA (ZDARMA)'; }
  if (alreadyDone) {
    const p=progress[id]; inp.style.display='none'; btn.style.display='none'; hintBtn.style.display='none';
    if (p.correct===true) { res.className='q-result correct'; res.textContent='Ôśů SPR├üVN─Ü! +'+( p.pts||0)+' BOD┼«'; }
    else if (p.correct===false) { res.className='q-result wrong'; res.textContent='ÔťĽ ┼áPATN─Ü ÔÇö SPLN─ÜNO BEZ BODU'; }
    else { res.className='q-result open'; res.textContent='Ôťô SPLN─ÜNO'; }
  } else if ((questionObj.answer||'').trim()) {
    inp.style.display='block'; inp.value=''; btn.style.display='block'; btn.textContent='Ôľ║ POTVRDIT';
  } else {
    inp.style.display='none'; btn.style.display='block'; btn.textContent='Ôľ║ SPLN─ÜNO Ôťô';
  }
  document.getElementById('overlay').classList.add('show');
}

function revealHint() {
  document.getElementById('q-hint').classList.add('show');
  const hintBtn=document.getElementById('q-hint-btn'); hintBtn.disabled=true; hintBtn.textContent='­čĺí N├üPOV─ÜDA ODKRYTA';
  if (activeQuestion) { if (!progress[activeQuestion.id]) progress[activeQuestion.id]={}; progress[activeQuestion.id].hintUsed=true; saveProgress(); }
}

async function submitAnswer() {
  if (!activeQuestion) return;
  const cp=activeQuestion, bq=activeQBankQ;
  const inp=document.getElementById('q-input'), res=document.getElementById('q-result'), btn=document.getElementById('q-btn');
  const questionObj=bq||cp, correctAnswer=(questionObj.answer||'').trim();
  const hintUsed=!!(progress[cp.id]?.hintUsed);

  if (correctAnswer) {
    const given=inp.value.trim(); if (!given) { inp.focus(); return; }
    const correct=norm(given)===norm(correctAnswer);
    if (correct) {
      let earned=Math.max(BASE_POINTS-(hintUsed?1:0),0), bonusMsg='';
      if (!hintUsed) { streakCount++; localStorage.setItem('bojovka_streak_'+teamName,streakCount); if (streakCount%STREAK_EVERY===0) { earned+=STREAK_BONUS; bonusMsg+=' ­čöą STREAK +'+STREAK_BONUS+'!'; } }
      else { streakCount=0; localStorage.setItem('bojovka_streak_'+teamName,0); }
      const gotSpeed=await checkSpeedBonus(cp.id); if (gotSpeed) { earned+=1; bonusMsg+=' ÔÜí PRVN├Ź! +1'; }
      progress[cp.id]={unlocked:true,hintUsed,...progress[cp.id],lastAnswered:Date.now(),correct:true,pts:earned};
      totalScore+=earned;
      let msg='Ôśů SPR├üVN─Ü! +'+earned+' BOD┼«'; if (hintUsed) msg+=' (N├üPOV─ÜDA -1)'; if (bonusMsg) msg+=bonusMsg;
      const sp=streakCount%STREAK_EVERY; if (sp>0) msg+=' ['+sp+'/'+STREAK_EVERY+' ke streaku]';
      res.className='q-result correct'; res.textContent=msg;
    } else {
      streakCount=0; localStorage.setItem('bojovka_streak_'+teamName,0);
      progress[cp.id]={unlocked:true,hintUsed,...progress[cp.id],lastAnswered:Date.now(),correct:false,pts:0};
      res.className='q-result wrong'; res.textContent='ÔťĽ ┼áPATN─Ü. ODPOV─Ü─Ä: '+correctAnswer;
    }
    inp.style.display='none'; btn.style.display='none';
  } else {
    progress[cp.id]={unlocked:true,...progress[cp.id],lastAnswered:Date.now(),correct:null,pts:0};
    res.className='q-result open'; res.textContent='Ôťô CHECKPOINT SPLN─ÜN'; btn.style.display='none';
  }
  saveProgress(); updateScoreDisplay(); refreshMarker(cp.id); publishScore();
}

async function checkSpeedBonus(cpId) {
  const bonusKey='bojovka_speed_'+GAME_ID+'_'+cpId;
  const existing=localStorage.getItem(bonusKey);
  if (!existing) {
    try {
      const res=await fetch(WORKER_URL+'/scores?gameId='+GAME_ID);
      if (res.ok) { const data=await res.json(); const othersDone=(data.teams||[]).filter(t=>t.team!==teamName).some(t=>t.completedCheckpoints&&t.completedCheckpoints.includes(cpId)); if (othersDone) return false; }
    } catch(e) {}
    localStorage.setItem(bonusKey,teamName); return true;
  }
  return existing===teamName;
}

function norm(s) { return s.toLowerCase().trim().normalize('NFD').replace(/[╠Ç-═»]/g,''); }
function closeOverlay() { document.getElementById('overlay').classList.remove('show'); activeQuestion=null; activeQBankQ=null; }

function refreshMarker(id) {
  const cp=questions.find(x=>x.id===id); if (!cp||!markers[id]) return;
  const num=questions.indexOf(cp)+1;
  markers[id].marker.setIcon(L.divIcon({ className:'', html:getMarkerHTML(cp,num,'answered'), iconSize:[40,40], iconAnchor:[20,20] }));
}

// ÔöÇÔöÇ SK├ôRE ÔöÇÔöÇ
function updateScoreDisplay() {
  document.getElementById('score-val').textContent = totalScore;
  updateStreakDisplay();
}

function updateStreakDisplay() {
  const wrap = document.getElementById('streak-wrap');
  const fire = document.getElementById('streak-fire');
  const num  = document.getElementById('streak-num');
  if (!wrap) return;
  if (streakCount === 0) { wrap.style.display='none'; return; }
  wrap.style.display = 'flex';
  num.textContent = 'Î' + streakCount;
  if (streakCount >= 6)      { fire.className='streak-fire inferno'; num.className='streak-num inferno'; }
  else if (streakCount >= 3) { fire.className='streak-fire hot';     num.className='streak-num hot'; }
  else                       { fire.className='streak-fire warm';    num.className='streak-num'; }
}

// ÔöÇÔöÇ LEADERBOARD ÔöÇÔöÇ
async function publishScore() {
  const completed=Object.keys(progress).filter(id=>progress[id]?.lastAnswered);
  const route=ROUTES[routeIndex]||ROUTES[0];
  const entry={team:teamName,score:totalScore,checkpoints:completed.length,completedCheckpoints:completed,gameId:GAME_ID,routeId:route.id};
  localStorage.setItem('bojovka_lb_'+teamName,JSON.stringify({...entry,updated:Date.now()}));
  try { await fetch(WORKER_URL+'/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}); } catch(e) {}
}

async function refreshLeaderboard() {
  const el=document.getElementById('lb-list');
  el.innerHTML='<div style="font-family:VT323,monospace;font-size:18px;color:var(--gray);text-align:center;padding:16px">Na─Ź├şt├ím...</div>';
  let teams={};
  try {
    const res=await fetch(`${WORKER_URL}/scores?gameId=${GAME_ID}`);
    if (res.ok) { const data=await res.json(); if (data.teams) data.teams.filter(t=>t.score>=0).forEach(t=>{teams[t.team]=t;}); }
  } catch(e) {
    for (let i=0;i<localStorage.length;i++) { const k=localStorage.key(i); if (k&&k.startsWith('bojovka_lb_')) { try { const e=JSON.parse(localStorage.getItem(k)); if (e&&e.team&&e.score>=0) teams[e.team]=e; } catch(e){} } }
  }
  const route=ROUTES[routeIndex]||ROUTES[0];
  teams[teamName]={team:teamName,score:totalScore,checkpoints:Object.values(progress).filter(p=>p.lastAnswered).length,routeId:route.id,updated:Date.now()};
  const sorted=Object.values(teams).sort((a,b)=>b.score-a.score||b.checkpoints-a.checkpoints);
  if (!sorted.length) { el.innerHTML='<div style="font-family:VT323,monospace;font-size:18px;color:var(--gray);text-align:center;padding:16px">┼Ż├ídn├ę t├Żmy zat├şm.</div>'; }
  else {
    el.innerHTML=sorted.map((t,i)=>{
      const r=ROUTES.find(r=>r.id===t.routeId);
      const routeLabel=r?`<span style="font-size:5px;color:${r.color};display:block;margin-top:2px">${r.name}</span>`:'';
      return `<div class="lb-row rank-${i+1} ${t.team===teamName?'me':''}">
        <div class="lb-pos">${i===0?'­čąç':i===1?'­čął':i===2?'­čąë':(i+1)+'.'}</div>
        <div style="flex:1;min-width:0"><div class="lb-name">${esc(t.team)}${t.team===teamName?' ÔŚä':''}</div>${routeLabel}<div class="lb-cp">${t.checkpoints} checkpoint┼»</div></div>
        <div class="lb-pts">${t.score} b</div>
      </div>`;
    }).join('');
  }
  document.getElementById('lb-updated').textContent='Aktualizov├íno: '+new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
}

function openLeaderboard() { document.getElementById('lb-overlay').classList.add('show'); refreshLeaderboard(); }
function closeLeaderboard() { document.getElementById('lb-overlay').classList.remove('show'); }
function saveProgress() { localStorage.setItem(PROGRESS_KEY+'_'+teamName,JSON.stringify(progress)); }
function setStatus(msg,type='') { const el=document.getElementById('status-bar'); el.textContent=msg; el.className='status-bar'+(type?' '+type:''); }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
